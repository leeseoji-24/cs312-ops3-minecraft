name: Build and Push Minecraft to ECR

on:
  push:
    tags:
      - 'v*'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: cs312-minecraft-op3

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull and retag Minecraft image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker pull itzg/minecraft-server:latest
          docker tag itzg/minecraft-server:latest \
            $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.ref_name }}

      - name: Smoke test
        run: |
          docker run -d --name minecraft-test \
            -e EULA=TRUE \
            -e MEMORY=512M \
            -p 25565:25565 \
            itzg/minecraft-server:latest
          echo "Waiting for Minecraft to initialize..."
          for i in $(seq 1 12); do
            sleep 10
            if docker logs minecraft-test 2>&1 | grep -q "Done"; then
              echo "Smoke test passed - server initialized"
              docker stop minecraft-test
              exit 0
            fi
            echo "Attempt $i/12 - still waiting..."
          done
          echo "Smoke test failed - server never initialized"
          docker logs minecraft-test
          docker stop minecraft-test
          exit 1

      - name: Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.ref_name }}
          docker tag $ECR_REGISTRY/${{ env.ECC_REPOSITORY }}:${{ github.ref_name }} \
            $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
